<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — AutoParts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header" id="header">
      <div class="container header__inner">
        <a href="index.html" class="logo"
          ><span class="logo__icon">⚙</span
          ><span class="logo__text">AUTO<span>PARTS</span></span></a
        >
      </div>
    </header>

    <div class="auth-page">
      <div class="auth-card" style="max-width: 480px">
        <div style="text-align: center; margin-bottom: 24px">
          <a href="index.html" class="logo" style="justify-content: center"
            ><span class="logo__icon">⚙</span
            ><span class="logo__text" style="color: var(--dark)"
              >AUTO<span>PARTS</span></span
            ></a
          >
        </div>
        <div class="auth-card__title">Регистрация</div>
        <div class="auth-card__sub">Создайте аккаунт для удобных покупок</div>

        <form
          id="reg-form"
          style="display: flex; flex-direction: column; gap: 14px"
        >
          <div class="form-group">
            <label class="form-label">Имя *</label>
            <input
              type="text"
              class="form-input"
              placeholder="Ваше имя"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Телефон *</label>
            <input
              type="tel"
              class="form-input"
              placeholder="+996 700 000 000"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-input"
              placeholder="email@example.com"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Пароль *</label>
            <input
              type="password"
              class="form-input"
              id="reg-pass"
              placeholder="Минимум 8 символов"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Подтвердите пароль *</label>
            <input
              type="password"
              class="form-input"
              id="reg-pass2"
              placeholder="Повторите пароль"
              required
            />
          </div>
          <div style="font-size: 12px; color: var(--mid)">
            Нажимая «Зарегистрироваться», вы соглашаетесь с
            <a href="#" style="color: var(--primary)"
              >условиями использования</a
            >
            и
            <a href="#" style="color: var(--primary)"
              >политикой конфиденциальности</a
            >
          </div>
          <button type="submit" class="btn btn--primary btn--full btn--lg">
            Зарегистрироваться
          </button>
        </form>

        <div class="auth-card__footer">
          Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
