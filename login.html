<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — AutoParts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header" id="header">
      <div class="container header__inner">
        <a href="index.html" class="logo"
          ><span class="logo__icon">⚙</span
          ><span class="logo__text">AUTO<span>PARTS</span></span></a
        >
        <div class="header__actions" style="margin-left: auto">
          <a href="cart.html" class="action-btn"
            ><svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path
                d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
              /></svg
            ><span class="action-badge" id="cart-count">0</span></a
          >
        </div>
      </div>
    </header>

    <div class="auth-page">
      <div class="auth-card">
        <div style="text-align: center; margin-bottom: 24px">
          <a href="index.html" class="logo" style="justify-content: center"
            ><span class="logo__icon">⚙</span
            ><span class="logo__text" style="color: var(--dark)"
              >AUTO<span>PARTS</span></span
            ></a
          >
        </div>
        <div class="auth-card__title">Вход</div>
        <div class="auth-card__sub">Введите данные для входа в аккаунт</div>

        <form
          id="login-form"
          style="display: flex; flex-direction: column; gap: 16px"
        >
          <div class="form-group">
            <label class="form-label">Телефон или Email *</label>
            <input
              type="text"
              class="form-input"
              placeholder="+996 700 000 000 или email"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Пароль *</label>
            <div style="position: relative">
              <input
                type="password"
                class="form-input"
                placeholder="Введите пароль"
                required
                style="width: 100%; padding-right: 48px"
              />
              <button
                type="button"
                onclick="togglePass(this)"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  color: var(--mid);
                  font-size: 18px;
                "
              >
                👁
              </button>
            </div>
          </div>
          <div style="display: flex; justify-content: flex-end">
            <a
              href="#"
              style="font-size: 13px; color: var(--primary); font-weight: 600"
              >Забыли пароль?</a
            >
          </div>
          <button type="submit" class="btn btn--primary btn--full btn--lg">
            Войти
          </button>
        </form>

        <div style="position: relative; text-align: center; margin: 20px 0">
          <div style="height: 1px; background: var(--border-light)"></div>
          <span
            style="
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              background: var(--white);
              padding: 0 12px;
              font-size: 13px;
              color: var(--mid);
            "
            >или</span
          >
        </div>

        <a href="register.html" class="btn btn--ghost btn--full"
          >Создать аккаунт</a
        >

        <div class="auth-card__footer">
          Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
    <script>
      function togglePass(btn) {
        const input = btn.previousElementSibling;
        input.type = input.type === "password" ? "text" : "password";
      }
    </script>
  </body>
</html>
